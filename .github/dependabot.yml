version: 2
updates:
  # Next.js dashboard
  - package-ecosystem: "npm"
    directory: "/web"
    schedule:
      interval: "weekly"
      day: "saturday"
    open-pull-requests-limit: 5
    labels:
      - "deps"
      - "area:web"
    groups:
      tailwind:
        patterns:
          - "tailwindcss"
          - "@tailwindcss/*"
          - "postcss"
          - "autoprefixer"
      radix:
        patterns:
          - "@radix-ui/*"
      types:
        patterns:
          - "@types/*"
      lint:
        patterns:
          - "@biomejs/*"

  # MCP server
  - package-ecosystem: "npm"
    directory: "/mcp"
    schedule:
      interval: "weekly"
      day: "saturday"
    open-pull-requests-limit: 3
    labels:
      - "deps"
      - "area:mcp"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    labels:
      - "deps"
      - "area:ci"
